name: flutter_gemini_chat
description: "Gemini chat app ported from React to Flutter"
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_generative_ai: ^0.4.3
  shared_preferences: ^2.2.0
  http: ^1.1.0
  supabase_flutter: ^2.5.6
  flutter_markdown: ^0.7.3
  url_launcher: ^6.2.6
  audioplayers: ^6.1.0
  highlight: ^0.7.0
  markdown: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
